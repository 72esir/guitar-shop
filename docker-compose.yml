version: "3.8"

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --set redpanda.auto_create_topics_enabled=true
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "29092:29092"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-guitar_shop_db}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

  recs_worker:
    restart: always
    build:
      context: .
      dockerfile: recs_worker/Dockerfile
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-guitar_shop_db}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  notifications_service:
    restart: always
    build: 
      context: .
      dockerfile: notifications_service/Dockerfile
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:29092
    depends_on:
      - redpanda

  orders_service:
    restart: always
    build:
      context: .
      dockerfile: orders_service/Dockerfile
    environment:
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-guitar_shop_db}
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:29092
    depends_on:
      - redpanda
      - postgres
    deploy:
      replicas: 2 # СРАЗУ 2 КОПИИ сервиса заказов для балансировки

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - orders_service
      # - products_service #пока нет раскомментить потом
